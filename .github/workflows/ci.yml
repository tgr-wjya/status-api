# Finally writing my own GitHub Action CI

name: CI
permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci # the same as bun install --frozen-lockfile

      - name: Run biome lint
        run: bunx biome ci

      - name: Run tests with coverage
        run: bun test --coverage --coverage-reporter=lcov

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.2

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to Azure
        uses: azure/login@v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/status-api:latest || true

          docker build \
            --cache-from ghcr.io/${{ github.repository_owner }}/status-api:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t ghcr.io/${{ github.repository_owner }}/status-api:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/status-api:latest \
            .

          docker push ghcr.io/${{ github.repository_owner }}/status-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/status-api:latest

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name status-api \
            --resource-group docker-mastery-rg \
            --image ghcr.io/${{ github.repository_owner }}/status-api:${{ github.sha }}
