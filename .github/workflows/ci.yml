# Finally writing my own GitHub Action CI

name: CI
permissions:
  contents: read

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci # the same as bun install --frozen-lockfile

      - name: Run biome lint
        run: bun biome ci

      - name: Run tests with coverage
        run: bun test --coverage --coverage-reporter=lcov

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to Azure
        uses: azure/login@v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push to ACR
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker pull ${{ secrets.ACR_DNS_NAME }}.azurecr.io/status-api:latest || true

          docker build \
            --cache-from ${{ secrets.ACR_DNS_NAME }}.azurecr.io/status-api:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t ${{ secrets.ACR_DNS_NAME }}.azurecr.io/status-api:${{ github.sha }} \
            -t ${{ secrets.ACR_DNS_NAME }}.azurecr.io/status-api:latest \
            .
          docker push ${{ secrets.ACR_DNS_NAME }}.azurecr.io/status-api:${{ github.sha }}
          docker push ${{ secrets.ACR_DNS_NAME }}.azurecr.io/status-api:latest

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name status-api \
            --resource-group docker-mastery-rg \
            --image ${{ secrets.ACR_DNS_NAME }}.azurecr.io/status-api:${{ github.sha }}
