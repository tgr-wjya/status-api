# Finally writing my own GitHub Action CI

name: CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - main # This is especially useful if you have a multi-branch set up

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

