# Finally writing my own GitHub Action CI

name: CI

on:
  push:
    branches:
      - "**" # This covers all branches
  pull_request:
    branches:
      - main # This is especially useful if you have a multi-branch set up

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: action/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # I learned this trick from SonarQube, its more safer to use the full-commit SHA

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore_keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test
