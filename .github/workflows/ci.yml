# Finally writing my own GitHub Action CI

name: CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  # TODO: Add Codecov Coverage here later on.

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to Azure
        uses: azure/login@v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image status-api:${{ github.sha }} \
            --image status-api:latest \
            .

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name status-api \
            --resource-group docker-mastery-rg \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/status-api:${{ github.sha }}
